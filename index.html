<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Musiku">
<meta name="theme-color" content="#0a0a0f">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<title>Musiku</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --accent:#a78bfa;
  --accent-dark:#7c3aed;
  --bg:#0a0a0f;
  --bg2:#12121a;
  --bg3:#1a1a26;
  --bg4:#22223a;
  --text:#ffffff;
  --text2:#888899;
  --text3:#55556a;
  --border:#2a2a3e;
  --safe-top:env(safe-area-inset-top,44px);
  --safe-bot:env(safe-area-inset-bottom,34px);
}
html,body{
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:'Figtree',sans-serif;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
/* LAYOUT */
#app{
  display:flex;
  flex-direction:column;
  height:100dvh;
  max-width:430px;
  margin:0 auto;
  position:relative;
  overflow:hidden;
}
.screen{
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding-bottom:calc(130px + var(--safe-bot));
  display:none;
}
.screen.active{display:block;}
/* STATUS BAR SPACER */
.statusbar-space{
  height:calc(var(--safe-top) + 8px);
  flex-shrink:0;
  background:var(--bg);
}
/* TABS */
.tabbar{
  position:fixed;
  bottom:0;left:0;right:0;
  max-width:430px;
  margin:0 auto;
  background:rgba(10,10,15,0.92);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:0.5px solid var(--border);
  display:flex;
  padding-bottom:var(--safe-bot);
  z-index:100;
}
.tabitem{
  flex:1;display:flex;flex-direction:column;
  align-items:center;gap:3px;
  padding:10px 0 4px;
  background:none;border:none;cursor:pointer;
  font-family:'Figtree',sans-serif;
}
.tabitem i{font-size:22px;color:var(--text3);transition:color .15s;}
.tabitem span{font-size:10px;color:var(--text3);transition:color .15s;}
.tabitem.active i,.tabitem.active span{color:var(--accent);}
/* MINI PLAYER */
#miniPlayer{
  position:fixed;
  bottom:calc(52px + var(--safe-bot));
  left:12px;right:12px;
  max-width:406px;
  margin:0 auto;
  background:var(--bg3);
  border:0.5px solid var(--border);
  border-radius:18px;
  padding:10px 14px;
  display:none;
  align-items:center;
  gap:12px;
  z-index:90;
  cursor:pointer;
  transition:opacity .2s;
}
.mini-thumb{
  width:40px;height:40px;border-radius:10px;
  background:var(--bg4);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;overflow:hidden;
}
.mini-thumb img{width:100%;height:100%;object-fit:cover;border-radius:10px;}
.mini-thumb .placeholder-icon{font-size:22px;}
.mini-info{flex:1;min-width:0;}
.mini-title{color:var(--text);font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mini-artist{color:var(--text2);font-size:11px;margin-top:1px;}
.mini-btns{display:flex;align-items:center;gap:0;}
.mini-btn{background:none;border:none;padding:8px;cursor:pointer;}
.mini-btn i{font-size:22px;color:var(--text2);}
.mini-prog{
  position:absolute;bottom:0;left:0;right:0;height:3px;
  background:var(--border);border-radius:0 0 18px 18px;overflow:hidden;
}
.mini-prog-bar{height:100%;background:var(--accent);width:0%;transition:width .5s linear;}

/* ===== HOME ===== */
#homeScreen{padding:0 20px;}
.home-header{padding:20px 0 16px;}
.home-greeting{color:var(--text3);font-size:12px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px;}
.home-title{color:var(--text);font-size:28px;font-weight:700;}
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 20px;gap:16px;text-align:center;
}
.empty-state .big-icon{font-size:56px;opacity:.3;}
.empty-state p{color:var(--text3);font-size:14px;line-height:1.6;}
.import-btn{
  background:var(--accent);color:#fff;
  border:none;border-radius:14px;
  padding:14px 28px;
  font-family:'Figtree',sans-serif;font-size:15px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;gap:8px;
  transition:opacity .15s;
}
.import-btn:active{opacity:.8;}
.section-hd{
  display:flex;justify-content:space-between;align-items:center;
  margin:24px 0 12px;
}
.section-hd h2{color:var(--text);font-size:18px;font-weight:700;}
.section-hd .count{color:var(--text3);font-size:13px;}
.track-list{display:flex;flex-direction:column;gap:2px;}
.track-row{
  display:flex;align-items:center;gap:12px;
  padding:8px 10px;border-radius:14px;
  cursor:pointer;transition:background .12s;
  -webkit-user-select:none;user-select:none;
}
.track-row:active{background:var(--bg3);}
.track-row.now-playing{background:var(--bg3);}
.track-art{
  width:46px;height:46px;border-radius:10px;
  background:var(--bg4);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;overflow:hidden;position:relative;
}
.track-art img{width:100%;height:100%;object-fit:cover;border-radius:10px;}
.track-art .art-icon{font-size:22px;color:var(--text3);}
.track-art .playing-anim{
  position:absolute;inset:0;background:rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;border-radius:10px;
}
.track-art .playing-anim i{color:var(--accent);font-size:18px;}
.track-info{flex:1;min-width:0;}
.track-name{color:var(--text);font-size:14px;font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.track-name.accent{color:var(--accent);}
.track-sub{color:var(--text3);font-size:12px;margin-top:2px;}
.track-dur{color:var(--text3);font-size:12px;flex-shrink:0;}
.track-more{background:none;border:none;padding:8px;cursor:pointer;}
.track-more i{color:var(--text3);font-size:18px;}

/* ===== LIBRARY ===== */
#libraryScreen{padding:0 20px;}
.library-header{padding:20px 0 16px;}
.library-header h1{color:var(--text);font-size:28px;font-weight:700;}
.lib-actions{display:flex;gap:10px;margin-bottom:20px;}
.lib-action-btn{
  flex:1;background:var(--bg3);border:0.5px solid var(--border);
  border-radius:12px;padding:12px;
  display:flex;align-items:center;gap:8px;
  cursor:pointer;transition:background .12s;
}
.lib-action-btn:active{background:var(--bg4);}
.lib-action-btn i{font-size:20px;color:var(--accent);}
.lib-action-btn span{color:var(--text);font-size:13px;font-weight:500;}

/* ===== PLAYER SCREEN ===== */
#playerScreen{
  position:fixed;inset:0;
  background:var(--bg);
  z-index:200;
  display:flex;flex-direction:column;
  padding:0 28px calc(24px + var(--safe-bot));
  overflow-y:auto;
  transform:translateY(100%);
  transition:transform .4s cubic-bezier(.32,.72,0,1);
}
#playerScreen.open{transform:translateY(0);}
.player-handle-area{
  padding:calc(var(--safe-top) + 4px) 0 8px;
  display:flex;justify-content:center;cursor:pointer;
}
.player-handle{width:36px;height:4px;background:var(--bg4);border-radius:2px;}
.player-top{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;
}
.player-label{color:var(--text2);font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
.player-menu-btn{background:none;border:none;cursor:pointer;padding:4px;}
.player-menu-btn i{color:var(--text2);font-size:20px;}
.player-cover-wrap{
  width:100%;aspect-ratio:1;
  border-radius:22px;
  background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:32px;overflow:hidden;
  transition:transform .3s;
}
.player-cover-wrap.playing{animation:coverPulse 4s ease-in-out infinite;}
@keyframes coverPulse{
  0%,100%{transform:scale(1);box-shadow:0 24px 64px rgba(167,139,250,.18);}
  50%{transform:scale(1.012);box-shadow:0 32px 80px rgba(167,139,250,.30);}
}
.player-cover-wrap img{width:100%;height:100%;object-fit:cover;}
.cover-placeholder{display:flex;flex-direction:column;align-items:center;gap:12px;}
.cover-placeholder i{font-size:80px;color:var(--bg4);}
.cover-placeholder span{color:var(--text3);font-size:13px;}
.player-meta{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;}
.player-title-block{}
.player-song{color:var(--text);font-size:22px;font-weight:700;margin-bottom:4px;line-height:1.2;}
.player-artist{color:var(--text2);font-size:15px;}
.like-btn{background:none;border:none;cursor:pointer;padding:8px;}
.like-btn i{font-size:24px;color:var(--text3);transition:all .2s;}
.like-btn.liked i{color:#f472b6;}
/* progress */
.prog-wrap{margin-bottom:20px;}
.prog-track{
  width:100%;height:4px;background:var(--bg4);border-radius:2px;
  position:relative;margin-bottom:10px;cursor:pointer;
}
.prog-fill{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg,var(--accent-dark),var(--accent));
  position:relative;transition:width .5s linear;
}
.prog-dot{
  width:14px;height:14px;border-radius:50%;background:#fff;
  position:absolute;right:-7px;top:-5px;
  box-shadow:0 2px 8px rgba(0,0,0,.5);
  opacity:0;transition:opacity .2s;
}
.prog-track:hover .prog-dot,.prog-track:active .prog-dot{opacity:1;}
.time-row{display:flex;justify-content:space-between;color:var(--text3);font-size:12px;}
/* controls */
.controls{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;
}
.ctrl{background:none;border:none;cursor:pointer;padding:10px;transition:transform .1s;}
.ctrl:active{transform:scale(.9);}
.ctrl i{color:var(--text2);font-size:24px;}
.ctrl.primary{
  width:68px;height:68px;border-radius:50%;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 28px rgba(167,139,250,.4);
  padding:0;
}
.ctrl.primary i{color:#fff;font-size:30px;}
.ctrl.lit i{color:var(--accent);}
/* volume */
.vol-row{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.vol-row i{color:var(--text3);font-size:18px;}
.vol-track{flex:1;height:4px;background:var(--bg4);border-radius:2px;cursor:pointer;position:relative;}
.vol-fill{height:100%;background:var(--text3);border-radius:2px;width:70%;}
/* extra */
.extra-row{display:flex;justify-content:space-around;}
.extra-btn{background:none;border:none;cursor:pointer;padding:10px;}
.extra-btn i{color:var(--text3);font-size:20px;}

/* ===== SEARCH ===== */
#searchScreen{padding:0 20px;}
.search-header{padding:20px 0 16px;}
.search-header h1{color:var(--text);font-size:28px;font-weight:700;margin-bottom:16px;}
.search-input-wrap{
  background:var(--bg3);border:0.5px solid var(--border);
  border-radius:14px;padding:12px 16px;
  display:flex;align-items:center;gap:10px;
  margin-bottom:20px;
}
.search-input-wrap i{color:var(--text3);font-size:18px;flex-shrink:0;}
.search-input-wrap input{
  background:none;border:none;outline:none;
  color:var(--text);font-family:'Figtree',sans-serif;font-size:15px;
  flex:1;
}
.search-input-wrap input::placeholder{color:var(--text3);}
#searchResults{display:flex;flex-direction:column;gap:2px;}

/* SCROLLBARS */
::-webkit-scrollbar{display:none;}

/* DELETE MENU */
.ctx-menu{
  position:fixed;bottom:calc(130px + var(--safe-bot));
  left:50%;transform:translateX(-50%);
  background:var(--bg3);border:0.5px solid var(--border);
  border-radius:16px;padding:8px;
  display:none;z-index:300;min-width:200px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
}
.ctx-menu.show{display:block;}
.ctx-item{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;border-radius:10px;
  cursor:pointer;transition:background .12s;
}
.ctx-item:active{background:var(--bg4);}
.ctx-item i{font-size:18px;}
.ctx-item span{font-size:14px;font-weight:500;}
.ctx-item.danger i,.ctx-item.danger span{color:#f87171;}

/* SORT BAR */
.sort-bar{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;}
.sort-pill{
  background:var(--bg3);border:0.5px solid var(--border);
  border-radius:20px;padding:6px 14px;
  font-size:12px;font-weight:500;color:var(--text2);
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  transition:all .15s;
}
.sort-pill.active{background:var(--accent);border-color:var(--accent);color:#fff;}
</style>
</head>
<body>
<div id="app">
  <div class="statusbar-space"></div>

  <!-- HOME -->
  <div id="homeScreen" class="screen active">
    <div class="home-header">
      <div class="home-greeting" id="greeting">Selamat pagi</div>
      <div class="home-title">Musiku 🎵</div>
    </div>
    <div id="homeContent"></div>
  </div>

  <!-- LIBRARY -->
  <div id="libraryScreen" class="screen">
    <div class="library-header">
      <h1>Perpustakaan</h1>
    </div>
    <div class="lib-actions">
      <div class="lib-action-btn" onclick="triggerImport()">
        <i class="ti ti-folder-plus"></i>
        <span>Import Musik</span>
      </div>
      <div class="lib-action-btn" onclick="clearAll()">
        <i class="ti ti-trash"></i>
        <span>Hapus Semua</span>
      </div>
    </div>
    <div class="sort-bar" id="sortBar">
      <div class="sort-pill active" data-sort="added" onclick="setSort(this,'added')">Terbaru</div>
      <div class="sort-pill" data-sort="name" onclick="setSort(this,'name')">Nama A-Z</div>
      <div class="sort-pill" data-sort="artist" onclick="setSort(this,'artist')">Artis</div>
      <div class="sort-pill" data-sort="duration" onclick="setSort(this,'duration')">Durasi</div>
    </div>
    <div id="libraryList" class="track-list"></div>
  </div>

  <!-- SEARCH -->
  <div id="searchScreen" class="screen">
    <div class="search-header">
      <h1>Cari</h1>
      <div class="search-input-wrap">
        <i class="ti ti-search"></i>
        <input type="text" id="searchInput" placeholder="Judul, artis, album…" oninput="doSearch()">
      </div>
    </div>
    <div id="searchResults" class="track-list"></div>
  </div>

  <!-- MINI PLAYER -->
  <div id="miniPlayer" onclick="openPlayer()">
    <div class="mini-thumb" id="miniThumb">
      <span class="placeholder-icon">🎵</span>
    </div>
    <div class="mini-info">
      <div class="mini-title" id="miniTitle">—</div>
      <div class="mini-artist" id="miniArtist">Pilih lagu</div>
    </div>
    <div class="mini-btns">
      <button class="mini-btn" onclick="event.stopPropagation();prevTrack()"><i class="ti ti-player-skip-back"></i></button>
      <button class="mini-btn" onclick="event.stopPropagation();togglePlay()" id="miniPlayBtn"><i class="ti ti-player-play" id="miniPlayIcon"></i></button>
      <button class="mini-btn" onclick="event.stopPropagation();nextTrack()"><i class="ti ti-player-skip-forward"></i></button>
    </div>
    <div class="mini-prog"><div class="mini-prog-bar" id="miniBar"></div></div>
  </div>

  <!-- TABBAR -->
  <div class="tabbar">
    <button class="tabitem active" onclick="switchTab('home',this)">
      <i class="ti ti-home"></i><span>Beranda</span>
    </button>
    <button class="tabitem" onclick="switchTab('library',this)">
      <i class="ti ti-library"></i><span>Perpustakaan</span>
    </button>
    <button class="tabitem" onclick="switchTab('search',this)">
      <i class="ti ti-search"></i><span>Cari</span>
    </button>
  </div>

  <!-- PLAYER FULLSCREEN -->
  <div id="playerScreen">
    <div class="player-handle-area" onclick="closePlayer()">
      <div class="player-handle"></div>
    </div>
    <div class="player-top">
      <span class="player-label">Now Playing</span>
      <button class="player-menu-btn"><i class="ti ti-dots"></i></button>
    </div>
    <div class="player-cover-wrap" id="playerCoverWrap">
      <div class="cover-placeholder">
        <i class="ti ti-music"></i>
        <span>Pilih lagu</span>
      </div>
    </div>
    <div class="player-meta">
      <div class="player-title-block">
        <div class="player-song" id="playerSong">—</div>
        <div class="player-artist" id="playerArtist">Artis tidak diketahui</div>
      </div>
      <button class="like-btn" id="likeBtn" onclick="toggleLike()"><i class="ti ti-heart"></i></button>
    </div>
    <div class="prog-wrap">
      <div class="prog-track" id="progTrack" onclick="seekTo(event)">
        <div class="prog-fill" id="progFill" style="width:0%">
          <div class="prog-dot"></div>
        </div>
      </div>
      <div class="time-row">
        <span id="timeElapsed">0:00</span>
        <span id="timeTotal">0:00</span>
      </div>
    </div>
    <div class="controls">
      <button class="ctrl" id="shuffleBtn" onclick="toggleShuffle()"><i class="ti ti-arrows-shuffle"></i></button>
      <button class="ctrl" onclick="prevTrack()"><i class="ti ti-player-skip-back"></i></button>
      <button class="ctrl primary" onclick="togglePlay()"><i class="ti ti-player-play" id="playIcon"></i></button>
      <button class="ctrl" onclick="nextTrack()"><i class="ti ti-player-skip-forward"></i></button>
      <button class="ctrl" id="repeatBtn" onclick="toggleRepeat()"><i class="ti ti-repeat"></i></button>
    </div>
    <div class="vol-row">
      <i class="ti ti-volume-3"></i>
      <div class="vol-track" onclick="setVol(event)">
        <div class="vol-fill" id="volFill"></div>
      </div>
      <i class="ti ti-volume"></i>
    </div>
    <div class="extra-row">
      <button class="extra-btn"><i class="ti ti-microphone-2"></i></button>
      <button class="extra-btn" onclick="triggerImport()"><i class="ti ti-folder-plus"></i></button>
      <button class="extra-btn"><i class="ti ti-share-3"></i></button>
      <button class="extra-btn"><i class="ti ti-playlist"></i></button>
    </div>
  </div>

  <!-- CONTEXT MENU -->
  <div class="ctx-menu" id="ctxMenu">
    <div class="ctx-item" onclick="ctxPlay()"><i class="ti ti-player-play" style="color:var(--accent)"></i><span>Putar Sekarang</span></div>
    <div class="ctx-item danger" onclick="ctxDelete()"><i class="ti ti-trash"></i><span>Hapus dari Perpustakaan</span></div>
    <div class="ctx-item" onclick="closeCtx()"><i class="ti ti-x" style="color:var(--text2)"></i><span>Batal</span></div>
  </div>
</div>

<!-- HIDDEN FILE INPUT -->
<input type="file" id="fileInput" accept=".mp3,.m4a,.aac,.wav,.flac,.ogg,.opus,.wma,.aiff,.mp4,audio/*" multiple style="display:none" onchange="handleFiles(this.files)">

<script>
// ─── STATE ───────────────────────────────────────────
let library = [];
let queue = [];
let currentIdx = -1;
let isPlaying = false;
let isShuffle = false;
let repeatMode = 0; // 0=off 1=all 2=one
let currentSort = 'added';
let ctxTargetId = null;

const audio = new Audio();
audio.preload = 'metadata';

// ─── INDEXEDDB ───────────────────────────────────────
let db;
const DB_NAME = 'MusicuDB', STORE = 'tracks';

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        d.createObjectStore(STORE, {keyPath:'id'});
      }
    };
    req.onsuccess = e => { db = e.target.result; res(); };
    req.onerror = () => rej(req.error);
  });
}

function dbGetAll() {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE,'readonly');
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => res(req.result || []);
    req.onerror = () => rej(req.error);
  });
}

function dbPut(track) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE,'readwrite');
    tx.objectStore(STORE).put(track).onsuccess = () => res();
    tx.onerror = () => rej(tx.error);
  });
}

function dbDelete(id) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE,'readwrite');
    tx.objectStore(STORE).delete(id).onsuccess = () => res();
    tx.onerror = () => rej(tx.error);
  });
}

function dbClear() {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE,'readwrite');
    tx.objectStore(STORE).clear().onsuccess = () => res();
    tx.onerror = () => rej(tx.error);
  });
}

// ─── INIT ─────────────────────────────────────────────
async function init() {
  await openDB();
  library = await dbGetAll();
  // sort by added desc
  library.sort((a,b) => b.addedAt - a.addedAt);
  setGreeting();
  renderAll();
}

function setGreeting() {
  const h = new Date().getHours();
  const g = document.getElementById('greeting');
  if (h < 12) g.textContent = 'Selamat pagi ☀️';
  else if (h < 17) g.textContent = 'Selamat siang 🌤';
  else if (h < 20) g.textContent = 'Selamat sore 🌅';
  else g.textContent = 'Selamat malam 🌙';
}

// ─── FILE IMPORT ──────────────────────────────────────
function triggerImport() {
  document.getElementById('fileInput').click();
}

async function handleFiles(files) {
  if (!files.length) return;
  const arr = Array.from(files);
  let added = 0;
  for (const f of arr) {
    if (!f.type.startsWith('audio/') && !f.type.startsWith('video/mp4') && !f.name.match(/\.(mp3|m4a|aac|wav|flac|ogg|opus|wma|aiff|mp4)$/i)) continue;
    const id = f.name + '_' + f.size + '_' + f.lastModified;
    const exists = library.some(t => t.id === id);
    if (exists) continue;

    // read file as ArrayBuffer to store in IndexedDB
    const buf = await f.arrayBuffer();
    const meta = await parseMeta(f.name);
    const track = {
      id,
      name: meta.name,
      artist: meta.artist,
      album: meta.album,
      duration: 0, // will update on load
      addedAt: Date.now(),
      fileType: f.type,
      buffer: buf,
    };
    library.unshift(track);
    await dbPut(track);
    added++;
  }
  if (added > 0) renderAll();
  document.getElementById('fileInput').value = '';
}

function parseMeta(filename) {
  // Remove extension
  let name = filename.replace(/\.[^.]+$/, '');
  let artist = 'Artis tidak diketahui';
  let album = '';
  // Try "Artist - Title" pattern
  const dash = name.indexOf(' - ');
  if (dash > 0) {
    artist = name.slice(0, dash).trim();
    name = name.slice(dash + 3).trim();
  }
  // Try "01. Title" pattern
  name = name.replace(/^\d+[\.\s]+/, '');
  return {name, artist, album};
}

function getBlobUrl(track) {
  // Create blob URL from ArrayBuffer
  const blob = new Blob([track.buffer], {type: track.fileType || 'audio/mpeg'});
  return URL.createObjectURL(blob);
}

// ─── PLAYBACK ─────────────────────────────────────────
let currentBlobUrl = null;

async function playTrack(idx) {
  if (idx < 0 || idx >= queue.length) return;
  currentIdx = idx;
  const track = queue[idx];

  // Revoke previous blob
  if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); currentBlobUrl = null; }

  currentBlobUrl = getBlobUrl(track);
  audio.src = currentBlobUrl;
  audio.play().catch(()=>{});
  isPlaying = true;
  updatePlayerUI();
  updateMiniPlayer();
  showMiniPlayer();
}

function togglePlay() {
  if (!queue.length) { triggerImport(); return; }
  if (audio.paused) {
    audio.play().catch(()=>{});
    isPlaying = true;
  } else {
    audio.pause();
    isPlaying = false;
  }
  updatePlayIcons();
}

function nextTrack() {
  if (!queue.length) return;
  if (repeatMode === 2) { audio.currentTime = 0; audio.play(); return; }
  let next = currentIdx + 1;
  if (isShuffle) next = Math.floor(Math.random() * queue.length);
  if (next >= queue.length) {
    if (repeatMode === 1) next = 0;
    else { audio.pause(); isPlaying = false; updatePlayIcons(); return; }
  }
  playTrack(next);
}

function prevTrack() {
  if (!queue.length) return;
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  let prev = currentIdx - 1;
  if (isShuffle) prev = Math.floor(Math.random() * queue.length);
  if (prev < 0) prev = queue.length - 1;
  playTrack(prev);
}

audio.addEventListener('ended', nextTrack);
audio.addEventListener('timeupdate', updateProgress);
audio.addEventListener('loadedmetadata', () => {
  if (queue[currentIdx]) {
    queue[currentIdx].duration = audio.duration;
    document.getElementById('timeTotal').textContent = fmtTime(audio.duration);
  }
});

function updateProgress() {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('miniBar').style.width = pct + '%';
  document.getElementById('timeElapsed').textContent = fmtTime(audio.currentTime);
  document.getElementById('timeTotal').textContent = fmtTime(audio.duration);
}

function seekTo(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audio.currentTime = pct * audio.duration;
}

function toggleShuffle() {
  isShuffle = !isShuffle;
  document.getElementById('shuffleBtn').classList.toggle('lit', isShuffle);
}

function toggleRepeat() {
  repeatMode = (repeatMode + 1) % 3;
  const btn = document.getElementById('repeatBtn');
  const icon = btn.querySelector('i');
  btn.classList.toggle('lit', repeatMode > 0);
  icon.className = repeatMode === 2 ? 'ti ti-repeat-once' : 'ti ti-repeat';
}

let liked = false;
function toggleLike() {
  liked = !liked;
  document.getElementById('likeBtn').classList.toggle('liked', liked);
}

function setVol(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audio.volume = pct;
  document.getElementById('volFill').style.width = (pct*100) + '%';
}

// ─── UI UPDATE ────────────────────────────────────────
function updatePlayIcons() {
  const playing = !audio.paused;
  const icon = playing ? 'ti-player-pause' : 'ti-player-play';
  document.getElementById('playIcon').className = 'ti ' + icon;
  document.getElementById('miniPlayIcon').className = 'ti ' + icon;
}

function updatePlayerUI() {
  const t = queue[currentIdx];
  if (!t) return;
  document.getElementById('playerSong').textContent = t.name;
  document.getElementById('playerArtist').textContent = t.artist;
  document.getElementById('playerCoverWrap').className = 'player-cover-wrap playing';
  document.getElementById('playerCoverWrap').innerHTML = `
    <div class="cover-placeholder">
      <i class="ti ti-music" style="color:var(--accent);opacity:.7"></i>
      <span>${t.name}</span>
    </div>`;
  document.getElementById('timeTotal').textContent = t.duration ? fmtTime(t.duration) : '—';
  updatePlayIcons();
  renderTrackLists();
}

function updateMiniPlayer() {
  const t = queue[currentIdx];
  if (!t) return;
  document.getElementById('miniTitle').textContent = t.name;
  document.getElementById('miniArtist').textContent = t.artist;
  document.getElementById('miniThumb').innerHTML = `<span class="placeholder-icon">🎵</span>`;
  updatePlayIcons();
}

function showMiniPlayer() {
  document.getElementById('miniPlayer').style.display = 'flex';
}

// ─── PLAYER OPEN/CLOSE ────────────────────────────────
function openPlayer() {
  document.getElementById('playerScreen').classList.add('open');
}
function closePlayer() {
  document.getElementById('playerScreen').classList.remove('open');
}

// ─── RENDER ───────────────────────────────────────────
function getSortedLibrary() {
  const sorted = [...library];
  if (currentSort === 'name') sorted.sort((a,b) => a.name.localeCompare(b.name));
  else if (currentSort === 'artist') sorted.sort((a,b) => a.artist.localeCompare(b.artist));
  else if (currentSort === 'duration') sorted.sort((a,b) => (b.duration||0) - (a.duration||0));
  else sorted.sort((a,b) => b.addedAt - a.addedAt);
  return sorted;
}

function renderAll() {
  renderHome();
  renderLibrary();
}

function renderHome() {
  const el = document.getElementById('homeContent');
  if (!library.length) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="big-icon">🎵</div>
        <p>Belum ada musik.<br>Import file audio dari penyimpanan kamu.</p>
        <button class="import-btn" onclick="triggerImport()">
          <i class="ti ti-folder-plus"></i> Import Musik
        </button>
      </div>`;
    return;
  }
  const recent = getSortedLibrary().slice(0, 20);
  el.innerHTML = `
    <div class="section-hd">
      <h2>Semua Lagu</h2>
      <span class="count">${library.length} lagu</span>
    </div>
    <div class="track-list" id="homeList"></div>`;
  const list = document.getElementById('homeList');
  recent.forEach((t, i) => {
    list.appendChild(makeTrackRow(t, i, recent));
  });
}

function renderLibrary() {
  const el = document.getElementById('libraryList');
  el.innerHTML = '';
  const sorted = getSortedLibrary();
  if (!sorted.length) {
    el.innerHTML = `<div class="empty-state" style="padding:40px 20px;">
      <div class="big-icon">📂</div>
      <p>Perpustakaan kosong.<br>Import musik untuk mulai.</p>
    </div>`;
    return;
  }
  sorted.forEach((t, i) => {
    el.appendChild(makeTrackRow(t, i, sorted));
  });
}

function renderTrackLists() {
  renderHome();
  renderLibrary();
}

function makeTrackRow(t, idx, list) {
  const div = document.createElement('div');
  const isCurrent = queue[currentIdx] && queue[currentIdx].id === t.id;
  div.className = 'track-row' + (isCurrent ? ' now-playing' : '');
  div.innerHTML = `
    <div class="track-art">
      <i class="ti ti-music art-icon"></i>
      ${isCurrent ? '<div class="playing-anim"><i class="ti ti-player-play"></i></div>' : ''}
    </div>
    <div class="track-info">
      <div class="track-name${isCurrent ? ' accent' : ''}">${escHtml(t.name)}</div>
      <div class="track-sub">${escHtml(t.artist)}${t.duration ? ' · ' + fmtTime(t.duration) : ''}</div>
    </div>
    <button class="track-more" onclick="event.stopPropagation();showCtx('${escAttr(t.id)}')">
      <i class="ti ti-dots-vertical"></i>
    </button>`;
  div.addEventListener('click', () => {
    queue = list;
    playTrack(idx);
    openPlayer();
  });
  return div;
}

function doSearch() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const el = document.getElementById('searchResults');
  el.innerHTML = '';
  if (!q) return;
  const results = library.filter(t =>
    t.name.toLowerCase().includes(q) || t.artist.toLowerCase().includes(q)
  );
  if (!results.length) {
    el.innerHTML = `<p style="color:var(--text3);font-size:14px;padding:20px 0;text-align:center;">Tidak ditemukan</p>`;
    return;
  }
  results.forEach((t, i) => el.appendChild(makeTrackRow(t, i, results)));
}

// ─── CONTEXT MENU ─────────────────────────────────────
function showCtx(id) {
  ctxTargetId = id;
  document.getElementById('ctxMenu').classList.add('show');
  setTimeout(() => document.addEventListener('click', closeCtxOutside), 10);
}
function closeCtx() {
  document.getElementById('ctxMenu').classList.remove('show');
  document.removeEventListener('click', closeCtxOutside);
}
function closeCtxOutside(e) {
  if (!document.getElementById('ctxMenu').contains(e.target)) closeCtx();
}
function ctxPlay() {
  closeCtx();
  const idx = library.findIndex(t => t.id === ctxTargetId);
  if (idx >= 0) { queue = library; playTrack(idx); openPlayer(); }
}
async function ctxDelete() {
  closeCtx();
  const idx = library.findIndex(t => t.id === ctxTargetId);
  if (idx < 0) return;
  if (queue[currentIdx] && queue[currentIdx].id === ctxTargetId) {
    audio.pause(); isPlaying = false;
    document.getElementById('miniPlayer').style.display = 'none';
    closePlayer();
  }
  await dbDelete(ctxTargetId);
  library.splice(idx, 1);
  renderAll();
}
async function clearAll() {
  if (!confirm('Hapus semua musik dari perpustakaan?')) return;
  await dbClear();
  library = [];
  audio.pause(); audio.src = '';
  document.getElementById('miniPlayer').style.display = 'none';
  closePlayer();
  renderAll();
}

// ─── SORT ─────────────────────────────────────────────
function setSort(el, sort) {
  currentSort = sort;
  document.querySelectorAll('.sort-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderLibrary();
}

// ─── TABS ─────────────────────────────────────────────
function switchTab(tab, el) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(tab + 'Screen').classList.add('active');
  document.querySelectorAll('.tabitem').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

// ─── HELPERS ──────────────────────────────────────────
function fmtTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2, '0');
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/'/g,"\\'");
}

// ─── PWA SERVICE WORKER ───────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// ─── START ────────────────────────────────────────────
init();
</script>
